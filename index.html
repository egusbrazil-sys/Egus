  <!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Egus Brazil | Estratégia de Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;0,900;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{--d:#0b0618;--p7:#47177a;--p5:#7c35b5;--ro:#c45abf;--bl:#f0b0ec;--tx:#f2eaff;--mt:#b89fd4;--dm:#6a5a88;--gb:rgba(255,255,255,0.04);--border:rgba(196,90,191,0.15)}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{background:var(--d);color:var(--tx);font-family:"DM Sans",sans-serif;overflow-x:hidden;overflow-y:auto;line-height:1.6}

body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 65% 50% at 15% 5%,rgba(124,53,181,.2),transparent 60%),radial-gradient(ellipse 50% 45% at 90% 95%,rgba(196,90,191,.14),transparent 60%)}

.w{max-width:1100px;margin:0 auto;padding:0 5%;position:relative;z-index:1}

section{position:relative;z-index:1}

.ey{display:inline-block;color:#c45abf;font-size:.66rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:.45rem}

.sh{font-family:"Cormorant Garamond",serif;font-size:clamp(1.7rem,3.5vw,2.5rem);font-weight:700;line-height:1.12}

.sh em{font-style:italic;background:linear-gradient(135deg,#c45abf,#f0b0ec);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.sr{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}

.sr.in{opacity:1;transform:translateY(0)}

.d1{transition-delay:.08s}.d2{transition-delay:.15s}.d3{transition-delay:.22s}.d4{transition-delay:.29s}.d5{transition-delay:.36s}

.bm{display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#7c35b5,#c45abf);color:#fff;padding:.72rem 1.7rem;border-radius:50px;font-size:.88rem;font-weight:700;text-decoration:none;box-shadow:0 4px 22px rgba(196,90,191,.38);transition:all .22s;border:none;cursor:pointer}

.bm:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(196,90,191,.55)}

.bg{display:inline-flex;align-items:center;gap:.4rem;border:1.5px solid rgba(196,90,191,.42);color:#f0b0ec;padding:.72rem 1.7rem;border-radius:50px;font-size:.88rem;font-weight:600;text-decoration:none;background:rgba(196,90,191,.05);backdrop-filter:blur(8px);transition:all .22s}

.bg:hover{border-color:#c45abf;background:rgba(196,90,191,.12)}

/* ── NAV ── */

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(11,6,24,.82);backdrop-filter:blur(22px);border-bottom:1px solid rgba(196,90,191,.1);transition:box-shadow .3s}

.nav-i{max-width:1100px;margin:0 auto;padding:.65rem 5%;display:flex;align-items:center;justify-content:space-between;gap:1rem}

.nav-logo-wrap{display:flex;align-items:center;gap:.5rem;text-decoration:none}

.nav-logo-img{width:30px;height:30px;object-fit:cover;border-radius:6px}

.logo-text{font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:500;color:rgba(240,176,236,.7);letter-spacing:1.5px;text-transform:lowercase}

.nl{display:flex;gap:1.4rem}

.nl a{color:#b89fd4;font-size:.78rem;font-weight:500;text-decoration:none;transition:color .2s}

.nl a:hover{color:#f0b0ec}

.ncta{background:linear-gradient(135deg,#7c35b5,#c45abf);color:#fff;padding:.38rem 1.1rem;border-radius:50px;font-size:.76rem;font-weight:700;text-decoration:none;box-shadow:0 0 14px rgba(196,90,191,.28);transition:all .22s}

.ncta:hover{box-shadow:0 0 28px rgba(196,90,191,.5);transform:scale(1.03)}

/* ═══════════════════════════════════

   HERO — FOTO PRINCIPAL GRANDE

   Texto no rodapé/lateral sem tapar rosto

═══════════════════════════════════ */

.hero{

  position:relative;height:100vh;min-height:640px;

  display:grid;

  /* 55% foto principal | 45% segunda foto */

  grid-template-columns:55fr 45fr;

  overflow:hidden;

}

.hphoto{position:relative;overflow:hidden}

.hphoto img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}

/* Foto principal (esq): escurece só nas bordas e rodapé, preserva o rosto */

.hphoto.main::after{

  content:"";position:absolute;inset:0;

  background:

    linear-gradient(180deg,rgba(11,6,24,.55) 0%,transparent 12%,transparent 58%,rgba(11,6,24,.95) 100%),

    linear-gradient(90deg,rgba(11,6,24,.08) 0%,transparent 30%,transparent 65%,rgba(11,6,24,.9) 100%);

}

/* Foto secundária (dir): mais escura, suporte visual */

.hphoto.sec{opacity:.65}

.hphoto.sec::after{

  content:"";position:absolute;inset:0;

  background:

    linear-gradient(90deg,rgba(11,6,24,.88) 0%,rgba(11,6,24,.35) 60%,rgba(11,6,24,.1) 100%),

    linear-gradient(180deg,rgba(11,6,24,.5) 0%,transparent 15%,transparent 70%,rgba(11,6,24,.9) 100%);

}

/* Glows sutis de cor */

.hero-glow{position:absolute;inset:0;z-index:1;pointer-events:none;

  background:radial-gradient(ellipse 40% 55% at 95% 25%,rgba(124,53,181,.22),transparent 65%),

  radial-gradient(ellipse 30% 40% at 5% 75%,rgba(196,90,191,.12),transparent 60%)}

/* Escurecimento topo global (nav) */

.hero::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;

  background:linear-gradient(180deg,rgba(11,6,24,.6) 0%,transparent 10%)}

/* ── BLOCO DE TEXTO — rodapé da foto principal, não tapa o rosto ── */

.hero-text{

  position:absolute;

  /* Fica na parte inferior esquerda — abaixo do tronco, nunca no rosto */

  bottom:0;left:0;

  width:55%;

  z-index:3;

  padding:0 3% 3rem 5%;

  animation:rise .85s cubic-bezier(.22,1,.36,1) both .2s;

}

.hpill{display:inline-flex;align-items:center;gap:.4rem;border:1px solid rgba(196,90,191,.48);background:rgba(11,6,24,.55);backdrop-filter:blur(14px);padding:.28rem .82rem;border-radius:50px;font-size:.66rem;font-weight:700;color:#e07ee0;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.9rem}

.hpill .dot{width:5px;height:5px;background:#c45abf;border-radius:50%;animation:blink 2s infinite;flex-shrink:0}

.hero-h1{

  font-family:"Cormorant Garamond",serif;

  font-size:clamp(2.2rem,5vw,4.2rem);

  font-weight:900;line-height:.97;

  margin-bottom:.65rem;

  text-shadow:0 3px 30px rgba(0,0,0,.7);

}

.hero-h1 em{

  font-style:italic;

  background:linear-gradient(135deg,#e07ee0,#f0b0ec);

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;

}

.hero-btns{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem}

/* ── PAINEL DE MÉTRICAS — canto direito da capa (não tapa o rosto) ── */

.hero-metrics{

  position:absolute;

  top:calc(4.5rem + 175px);right:2%;

  z-index:5;

  display:flex;flex-direction:column;gap:.38rem;

  animation:rise .85s cubic-bezier(.22,1,.36,1) both .4s;

}

.hmet{

  background:rgba(11,6,24,.75);

  backdrop-filter:blur(16px);

  border:1px solid rgba(196,90,191,.3);

  border-radius:10px;

  padding:.42rem .75rem;

  min-width:112px;

  text-align:center;

}

.hmet-val{font-family:"Cormorant Garamond",serif;font-size:1.65rem;font-weight:700;background:linear-gradient(135deg,#f0b0ec,#c45abf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;display:block}

.hmet-lbl{font-size:.63rem;color:#b89fd4;line-height:1.3;margin-top:.12rem}

/* ── SERVIÇOS — ícones no topo direito da capa ── */

.hero-services{

  position:absolute;

  top:4.5rem;right:2%;

  z-index:5;

  display:flex;flex-direction:column;gap:.25rem;

  animation:rise .8s cubic-bezier(.22,1,.36,1) both .55s;

}

.hsvc{

  display:inline-flex;align-items:center;gap:.35rem;

  background:rgba(11,6,24,.6);

  backdrop-filter:blur(12px);

  border:1px solid rgba(196,90,191,.25);

  padding:.2rem .55rem;border-radius:50px;

  font-size:.7rem;font-weight:600;color:#f0b0ec;

  white-space:nowrap;

}

/* ── PROOF BAR ── */

.pb{background:rgba(26,8,53,.45);border-top:1px solid rgba(196,90,191,.12);border-bottom:1px solid rgba(196,90,191,.12);padding:.5rem 5%}

.pbi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:1.2rem;flex-wrap:wrap}

.pi2{text-align:center}

.pn{font-family:"Cormorant Garamond",serif;font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,#f0b0ec,#c45abf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}

.pl{font-size:.68rem;color:#6a5a88;font-weight:500;line-height:1.3}

.pdiv{width:1px;height:26px;background:rgba(196,90,191,.18)}

/* ── ABOUT (compacto) ── */

.about-sec{padding:4rem 5%}

.about-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.5fr;gap:3rem;align-items:center}

.apo{position:relative;display:flex;justify-content:center}

.apo-shape{width:240px;height:320px;border-radius:120px 120px 28px 28px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.65),0 0 60px rgba(124,53,181,.15);position:relative;flex-shrink:0}

.apo-shape img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}

.apo-glow{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:270px;height:350px;background:radial-gradient(ellipse,rgba(196,90,191,.16),transparent 65%);filter:blur(28px);z-index:-1;border-radius:50%}

.atxt p{color:#b89fd4;line-height:1.72;margin-bottom:.7rem;font-size:.93rem}

.atxt .sh{margin-bottom:.75rem}

.chips{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.9rem}

.chip{background:rgba(196,90,191,.08);border:1px solid rgba(196,90,191,.2);padding:.25rem .75rem;border-radius:50px;font-size:.73rem;font-weight:600;color:#f0b0ec}

/* ── WHY INVEST (3 colunas compactas) ── */

.why-sec{padding:3rem 5%}

.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-top:1.5rem}

.wic{background:var(--gb);border:1px solid var(--border);border-radius:16px;padding:1.3rem 1.1rem;transition:all .28s}

.wic:hover{transform:translateY(-3px);border-color:rgba(196,90,191,.38);box-shadow:0 12px 36px rgba(124,53,181,.15)}

.wi-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#47177a,#c45abf);display:flex;align-items:center;justify-content:center;font-size:1.05rem;margin-bottom:.8rem}

.wic h3{font-size:.87rem;font-weight:700;margin-bottom:.32rem}

.wic p{font-size:.79rem;color:#b89fd4;line-height:1.55}

/* ── QUEM ATENDEMOS — carrossel horizontal ── */

.serve-sec{padding:3rem 5%}

.serve-track-wrap{overflow:hidden;position:relative;margin-top:1.4rem;width:100vw;margin-left:calc(-50vw + 50%)}

.serve-track{display:flex;gap:.75rem;padding:.25rem 2rem;animation:scrollTrack 28s linear infinite;width:max-content}

.serve-track:hover{animation-play-state:paused}

.sc{flex-shrink:0;background:var(--gb);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;width:190px;text-align:center;transition:border-color .25s}

.sc:hover{border-color:rgba(196,90,191,.38)}

.sci{font-size:1.4rem;margin-bottom:.4rem;display:block}

.sc h3{font-size:.8rem;font-weight:700;margin-bottom:.2rem}

.sc p{font-size:.71rem;color:#b89fd4;line-height:1.4}

/* ── CLIENTS ── */

.clients-sec{padding:3rem 5%}

.clients-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.75rem;margin-top:1.5rem}

.cl-card{background:var(--gb);border:1px solid var(--border);border-radius:16px;padding:1rem .75rem;text-align:center;transition:all .28s;display:flex;flex-direction:column;align-items:center;gap:.3rem}

.cl-card:hover{border-color:rgba(196,90,191,.4);transform:translateY(-3px)}

.cl-card.top-client{border-color:rgba(196,90,191,.32);background:rgba(124,53,181,.06)}

.cl-av{width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid rgba(196,90,191,.28);flex-shrink:0}

.cl-av img{width:100%;height:100%;object-fit:cover;display:block}

.cl-handle{font-size:.67rem;color:#c45abf;font-weight:700}

.cl-name{font-size:.68rem;color:#b89fd4;font-weight:500;line-height:1.2}

.cl-num{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:700;color:#f0b0ec;line-height:1}

.cl-lbl{font-size:.62rem;color:#6a5a88}

.cl-crown{font-size:.7rem}

/* ── RESULTS ── */

.results-sec{padding:1.8rem 5%}

.res-header{text-align:center;max-width:500px;margin:0 auto 1.2rem}

.showcase{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;align-items:start}

.sc-item{display:flex;flex-direction:column;align-items:center;gap:.65rem}

.phone-wrap{width:62%;margin:0 auto}

.phone-wrap img{width:100%;border-radius:12px;display:block;box-shadow:0 12px 32px rgba(0,0,0,.6)}

.sc-stats{width:100%}

.sc-stat-row{display:flex;align-items:center;justify-content:space-between;padding:.44rem 0;border-bottom:1px solid rgba(196,90,191,.1)}

.sc-stat-row:last-child{border-bottom:none}

.sc-stat-lbl{font-size:.71rem;color:#b89fd4}

.sc-stat-val{font-family:"Cormorant Garamond",serif;font-size:1.22rem;font-weight:700;background:linear-gradient(135deg,#f0b0ec,#c45abf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── PROCESSO — carrossel numerado ── */

.proc-sec{padding:3rem 5%}

.proc-grid{display:flex;flex-wrap:nowrap;gap:1rem;margin-top:2rem;overflow-x:auto;padding-bottom:1rem;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scroll-snap-type:x mandatory}

.proc-grid::before{content:"";position:absolute;top:22px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,#7c35b5,#c45abf,transparent);z-index:0}

.pstep{flex:0 0 220px;min-width:220px;text-align:center;position:relative;z-index:1;padding:.9rem .75rem;background:rgba(26,8,53,.5);border:1px solid rgba(196,90,191,.18);border-radius:14px;scroll-snap-align:start}

.pnum{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a0835,#47177a);border:2px solid rgba(196,90,191,.3);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:700;color:#f0b0ec;margin:0 auto .7rem;box-shadow:0 0 14px rgba(124,53,181,.25)}

.pstep h3{font-size:.83rem;font-weight:700;margin-bottom:.25rem}

.pstep p{font-size:.73rem;color:#b89fd4;line-height:1.4}/* No desktop todos visíveis; no mobile scroll */

.pstep{flex:0 0 220px;min-width:220px;text-align:center;position:relative;z-index:1;padding:.9rem .75rem;background:rgba(26,8,53,.5);border:1px solid rgba(196,90,191,.18);border-radius:14px}

.pnum{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a0835,#47177a);border:2px solid rgba(196,90,191,.3);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:700;color:#f0b0ec;margin:0 auto .7rem;box-shadow:0 0 14px rgba(124,53,181,.25)}

.pstep h3{font-size:.83rem;font-weight:700;margin-bottom:.25rem}

.pstep p{font-size:.73rem;color:#b89fd4;line-height:1.4}

/* ── PACKAGES (compacto) ── */

.pkg-sec{padding:3.5rem 5%}

.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;align-items:start}

.pkc{background:rgba(11,6,24,.7);border:1px solid var(--border);border-radius:20px;padding:1.6rem 1.4rem;position:relative;transition:all .28s;backdrop-filter:blur(8px)}

.pkc:hover{transform:translateY(-5px);box-shadow:0 18px 48px rgba(124,53,181,.22)}

.pkc.star{border-color:rgba(196,90,191,.48);background:linear-gradient(155deg,rgba(71,23,122,.42),rgba(11,6,24,.82));transform:scale(1.025)}

.pkc.star:hover{transform:scale(1.025) translateY(-5px)}

.sbadge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c35b5,#c45abf);color:#fff;font-size:.63rem;font-weight:800;padding:.24rem 1rem;border-radius:50px;white-space:nowrap;letter-spacing:1px;text-transform:uppercase}

.pname{font-family:"Cormorant Garamond",serif;font-size:1.25rem;font-weight:700;color:#f0b0ec;margin-bottom:.15rem}

.pdesc{font-size:.75rem;color:#6a5a88;margin-bottom:.9rem;line-height:1.4}

.pprice{padding-bottom:.9rem;border-bottom:1px solid rgba(196,90,191,.14);margin-bottom:.9rem}

.pamount{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,#f0b0ec,#c45abf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}

.pperiod{font-size:.73rem;color:#6a5a88;margin-top:.14rem}

.plist{list-style:none;margin-bottom:1.3rem}

.plist li{padding:.28rem 0;font-size:.78rem;color:#f2eaff;display:flex;align-items:flex-start;gap:.44rem;line-height:1.3}

.plist li .ck{color:#c45abf;flex-shrink:0;font-size:.75rem;margin-top:.08rem}

.plist li.gift{color:#f0b0ec;font-weight:600}

.pbf{display:block;width:100%;text-align:center;padding:.68rem;border-radius:50px;background:linear-gradient(135deg,#7c35b5,#c45abf);color:#fff;font-weight:700;font-size:.83rem;text-decoration:none;border:none;cursor:pointer;transition:all .2s}

.pbf:hover{box-shadow:0 6px 30px rgba(196,90,191,.5);transform:translateY(-1px)}

.pbo{display:block;width:100%;text-align:center;padding:.68rem;border-radius:50px;border:1.5px solid rgba(196,90,191,.35);color:#f0b0ec;font-weight:600;font-size:.83rem;text-decoration:none;background:transparent;transition:all .2s}

.pbo:hover{border-color:#c45abf;background:rgba(196,90,191,.07)}

/* ── PAYMENT + CTA JUNTOS ── */

.final-sec{padding:3.5rem 5%;text-align:center;position:relative;overflow:hidden}

.final-sec::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(124,53,181,.14),transparent 65%);pointer-events:none}

.pay-cards{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin:1.2rem 0 2.5rem}

.pyc{display:flex;align-items:center;gap:.5rem;background:var(--gb);border:1px solid var(--border);border-radius:12px;padding:.75rem 1.2rem;font-weight:600;transition:all .2s;font-size:.82rem}

.pyc:hover{border-color:rgba(196,90,191,.42);transform:translateY(-2px)}

.pyci{font-size:1.2rem}

footer{background:rgba(4,2,10,.85);border-top:1px solid rgba(196,90,191,.1);padding:1.2rem 5%;text-align:center;color:#6a5a88;font-size:.78rem}

.flogo-wrap{display:flex;align-items:center;justify-content:center;gap:.45rem;margin-bottom:.3rem}

.flogo-img{width:22px;height:22px;object-fit:cover;border-radius:5px;opacity:.75}

.flogo{font-family:"DM Sans",sans-serif;font-size:.8rem;font-weight:500;color:rgba(240,176,236,.55);letter-spacing:1.5px}

@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

@keyframes scrollTrack{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

@media(max-width:900px){

  .hero{grid-template-columns:1fr}

  .hphoto.sec{display:none}

  .hphoto.main::after{background:linear-gradient(180deg,rgba(11,6,24,.5) 0%,transparent 14%,transparent 45%,rgba(11,6,24,.97) 100%),linear-gradient(90deg,rgba(11,6,24,.05),transparent)}

  .hero-text{width:92%;padding:0 4% 2.5rem 4%}

  .hero-metrics{right:3%;top:auto;bottom:calc(100% - 45vh);transform:none;flex-direction:row;flex-wrap:wrap;gap:.4rem;justify-content:flex-end;max-width:55%}

  .hero-services{display:none}

  .about-grid{grid-template-columns:1fr;text-align:center}

  .chips{justify-content:center}

  .apo{margin-bottom:1.2rem}

  .why-grid{grid-template-columns:1fr 1fr}

  .pkg-grid{grid-template-columns:1fr}

  .pkc.star{transform:scale(1)}

  .showcase{grid-template-columns:1fr}

  .clients-grid{grid-template-columns:repeat(3,1fr)}

  .proc-grid{grid-template-columns:1fr;gap:.7rem}

  .proc-grid::before{display:none}

  .nl{display:none}

}

.clients-carousel{position:relative;overflow:hidden;width:100%}

.clients-track{display:flex;flex-wrap:nowrap;transition:transform .4s ease;will-change:transform;width:300%}
